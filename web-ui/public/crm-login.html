<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Outlook CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Satoshi:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --stone-50:  oklch(98.5% .004 80);
      --stone-100: oklch(96%   .006 80);
      --stone-200: oklch(91%   .010 80);
      --stone-400: oklch(72%   .016 80);
      --stone-500: oklch(62%   .018 80);
      --stone-700: oklch(40%   .018 80);
      --stone-900: oklch(22%   .012 80);
      --amber-50:  oklch(98%   .020 85);
      --amber-100: oklch(96%   .040 85);
      --amber-400: oklch(82%   .150 85);
      --amber-500: oklch(76%   .170 85);
      --amber-600: oklch(66%   .160 65);
      --ink:       oklch(18% .014 80);
      --radius-lg: 14px;
      --radius-xl: 20px;
      --shadow-md: 0 4px 20px oklch(18% .012 80 / 0.10);
      --shadow-lg: 0 12px 48px oklch(18% .012 80 / 0.14);
    }
    html, body {
      height: 100%;
      font-family: 'Satoshi', system-ui, sans-serif;
      background: var(--stone-50);
      color: var(--ink);
      font-optical-sizing: auto;
    }
    body {
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, oklch(96% .035 85 / .7), transparent),
        radial-gradient(ellipse 50% 40% at 85% 90%,  oklch(93% .028 80 / .4), transparent);
    }
    .card {
      background: #fff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      border: 1px solid oklch(91% .010 80 / .8);
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--amber-400), var(--amber-600));
      display: grid; place-items: center;
      box-shadow: 0 4px 16px oklch(76% .170 85 / .35);
    }
    .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
    .logo-wordmark {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--stone-900);
    }
    .hero {
      text-align: center;
      display: flex; flex-direction: column; gap: 8px;
    }
    .hero h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 750;
      letter-spacing: -0.6px;
      color: var(--stone-900);
      line-height: 1.2;
    }
    .hero p {
      font-size: 15px;
      color: var(--stone-500);
      line-height: 1.5;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: var(--stone-200);
    }
    .btn-ms {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius-lg);
      background: var(--stone-900);
      color: #fff;
      font-family: 'Satoshi', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.15px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 8px oklch(18% .012 80 / .18);
      min-height: 52px;
    }
    .btn-ms:hover {
      background: oklch(28% .016 80);
      box-shadow: 0 4px 16px oklch(18% .012 80 / .25);
      transform: translateY(-1px);
    }
    .btn-ms:active { transform: translateY(0); box-shadow: none; }
    .btn-ms:focus-visible {
      outline: 2px solid var(--amber-500);
      outline-offset: 3px;
    }
    .btn-ms svg { width: 20px; height: 20px; flex-shrink: 0; }
    .error-banner {
      display: none;
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      background: oklch(96% .030 25);
      border: 1px solid oklch(88% .060 25);
      color: oklch(42% .100 25);
      font-size: 14px;
      line-height: 1.4;
    }
    .error-banner.visible { display: block; }
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--stone-400);
      line-height: 1.5;
    }
    @media (prefers-reduced-motion: reduce) {
      .btn-ms { transition: none; }
    }
    @media (max-width: 480px) {
      .card { padding: 36px 28px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="logo" aria-label="Outlook CRM">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"/>
        </svg>
      </div>
      <span class="logo-wordmark">Outlook CRM</span>
    </div>

    <div class="hero">
      <h1>Welcome back</h1>
      <p>Sign in with your Microsoft account to access your customer workspace.</p>
    </div>

    <div class="divider" role="separator"></div>

    <div id="errorBanner" class="error-banner" role="alert" aria-live="polite"></div>

    <a href="/crm/auth/login" class="btn-ms" role="button" aria-label="Sign in with Microsoft">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0"  y="0"  width="10" height="10" fill="#f25022"/>
        <rect x="11" y="0"  width="10" height="10" fill="#7fba00"/>
        <rect x="0"  y="11" width="10" height="10" fill="#00a4ef"/>
        <rect x="11" y="11" width="10" height="10" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </a>

    <p class="footer">
      Your email account data stays private.<br>
      Each login is scoped to your account.
    </p>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const err = params.get('error');
      if (err) {
        const banner = document.getElementById('errorBanner');
        const msgs = {
          invalid_state: 'Authentication failed — please try again.',
          no_email: 'Could not retrieve your email from Microsoft. Please try again.',
          access_denied: 'Access was denied. Please allow the required permissions.',
        };
        banner.textContent = msgs[err] || `Sign-in error: ${err.replace(/_/g, ' ')}`;
        banner.classList.add('visible');
      }
    })();
  </script>
</body>
</html>
