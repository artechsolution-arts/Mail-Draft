# Single command to start everything: docker compose up --build
# Uses the host machine's local PostgreSQL 17 instead of a containerised DB.

services:

  # ── Ollama (local LLM) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    # ── Uncomment below for NVIDIA GPU support ────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Pull the Ollama model once (cached in volume on subsequent runs) ───────
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.2:3b}"]
    restart: "no"

  # ── CRM Web App ────────────────────────────────────────────────────────────
  crm:
    build: .
    command: sh -c "node crm/migrate.js && exec node web-ui/server.js"
    ports:
      - "${WEB_UI_PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-changeme}@host.docker.internal:5432/${PGDATABASE:-outlook_crm}
      OLLAMA_URL:   http://ollama:11434
      REDIRECT_URI: https://localhost:3000/crm/auth/callback
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── OAuth Auth Server (for MCP tool authentication) ───────────────────────
  auth-server:
    build: .
    command: node outlook-auth-server.js
    ports:
      - "3333:3333"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-changeme}@host.docker.internal:5432/${PGDATABASE:-outlook_crm}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  ollama_data:  # Ollama models — persists across restarts (~2GB for llama3.2:3b)
